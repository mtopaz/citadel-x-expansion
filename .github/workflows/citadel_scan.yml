name: CITADEL-X Unattended Scan

on:
  workflow_dispatch:
    inputs:
      batch:
        description: 'Batch number (each batch = ~5000 articles)'
        default: '1'
        type: string
      articles_per_cell:
        description: 'Articles per domain-year cell'
        default: '125'
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      matrix:
        domain: [stem, cs_ai, social_sciences, law, history_humanities]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate manifest for this batch
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: |
          BATCH=${{ inputs.batch || '1' }}
          SEED=$((42 + BATCH * 1000))
          APC=${{ inputs.articles_per_cell || '250' }}
          echo "Batch=$BATCH, Seed=$SEED, ArticlesPerCell=$APC"
          # Patch seed in generator
          sed -i "s/^SEED = .*/SEED = $SEED/" generate_manifest.py
          sed -i "s/^ARTICLES_PER_CELL = .*/ARTICLES_PER_CELL = $APC/" generate_manifest.py
          python generate_manifest.py 2>&1 | tee manifest_log.txt
          wc -l sampling_manifest.csv

      - name: Run domain scan
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
        run: |
          python citadel_production_scan.py --domain ${{ matrix.domain }} 2>&1 | tee scan_${{ matrix.domain }}.log
        timeout-minutes: 330

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: batch${{ inputs.batch || '1' }}-${{ matrix.domain }}
          path: |
            citadel_${{ matrix.domain }}_verified.csv
            citadel_${{ matrix.domain }}_flagged_prod.csv
            scan_${{ matrix.domain }}.log
          retention-days: 30

  chain-next:
    needs: scan
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Check if we should continue
        id: check
        run: |
          BATCH=${{ inputs.batch || '1' }}
          MAX_BATCH=20
          NEXT=$((BATCH + 1))
          if [ "$NEXT" -le "$MAX_BATCH" ]; then
            echo "continue=true" >> $GITHUB_OUTPUT
            echo "next_batch=$NEXT" >> $GITHUB_OUTPUT
            echo "Batch $BATCH complete. Triggering batch $NEXT..."
          else
            echo "continue=false" >> $GITHUB_OUTPUT
            echo "All $MAX_BATCH batches complete. Stopping."
          fi

      - name: Trigger next batch
        if: steps.check.outputs.continue == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/citadel_scan.yml/dispatches" \
            -d "{\"ref\":\"master\",\"inputs\":{\"batch\":\"${{ steps.check.outputs.next_batch }}\",\"articles_per_cell\":\"${{ inputs.articles_per_cell || '250' }}\"}}"
          echo "Triggered batch ${{ steps.check.outputs.next_batch }}"
